name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run go vet
        run: go vet ./...
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.22"
          go-package: "./..."
      - name: Test (Unit, Snapshot, and E2E)
        env:
          TERM: xterm-256color
        run: |
          go test -race -count=1 -v -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | grep total
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -o /tmp/sqlforge ./cmd/sqlforge
      - name: Upload coverage artefact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

  quality-gate:
    name: Quality Gate (CRAP)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage artefact
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ github.run_id }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run quality gate
        run: |
          python3 scripts/quality-gate.py . \
            --coverage coverage.out \
            --limit 10000
